<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dcf1ea"/>
      <stop offset="1" stop-color="#aedcd1"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#cfeae3" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="iris" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#3fb3a8"/>
      <stop offset="0.7" stop-color="#1f807c"/>
      <stop offset="1" stop-color="#125c5b"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- glass tile -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="url(#gloss)"/>

  <!-- eye glow behind -->
  <ellipse cx="32" cy="39" rx="13" ry="11" fill="url(#glow)"/>

  <!-- curtains parting over the eye -->
  <path d="M1 1 H32 V19 C 31 25 29 31 26 35 C 19 43 10 46 1 47 Z" fill="url(#curtain)"/>
  <path d="M63 1 H32 V19 C 33 25 35 31 38 35 C 45 43 54 46 63 47 Z" fill="url(#curtain)"/>
  <!-- inner curtain folds -->
  <path d="M14 1 C 13 14 11 26 4 36" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 1 C 51 14 53 26 60 36" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>
  <path d="M24 1 C 24 12 23 22 30 30" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40 1 C 40 12 41 22 34 30" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>

  <!-- eye -->
  <ellipse cx="32" cy="39" rx="8" ry="6.6" fill="#ffffff"/>
  <circle cx="32" cy="39" r="5" fill="url(#iris)"/>
  <circle cx="32" cy="39" r="2.4" fill="#0f3f3f"/>
  <circle cx="33.7" cy="37.3" r="1.1" fill="#ffffff"/>

  <!-- scrubber / timeline -->
  <line x1="23" y1="52" x2="41" y2="52" stroke="#1f807c" stroke-opacity="0.5" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="23" cy="52" r="1.7" fill="#1f807c" fill-opacity="0.45"/>
  <circle cx="41" cy="52" r="1.7" fill="#1f807c" fill-opacity="0.45"/>
  <circle cx="32" cy="52" r="2.6" fill="#2dd4bf"/>
  <circle cx="32" cy="52" r="2.6" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="0.8"/>
</svg>
